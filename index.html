<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-код для переказу (НБУ)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <form onsubmit="return generateQRCode(event)">
        <h1 class="text-2xl font-bold mb-4 text-center">QR-код для переказу</h1>
        <div class="mb-4">
            <label for="account" class="block text-gray-700">IBAN</label>
            <input type="text" id="account" placeholder="UA..."
                   class="w-full p-2 border border-gray-300 rounded mt-1" required>
        </div>
        <div class="mb-4">
            <label for="edrpo" class="block text-gray-700">ЄДРПОУ / РНОКПП</label>
            <input type="text" id="edrpo" placeholder="Код отримувача"
                   class="w-full p-2 border border-gray-300 rounded mt-1" required>
        </div>
        <div class="mb-4">
            <label for="recipient" class="block text-gray-700">Отримувач</label>
            <input type="text" id="recipient" placeholder="ПІБ або назва організації"
                   class="w-full p-2 border border-gray-300 rounded mt-1" required>
        </div>
        <div class="mb-4">
            <label for="amount" class="block text-gray-700">Сума (UAH)</label>
            <input type="number" min="0.01" step="0.01" id="amount" placeholder="0.01"
                   class="w-full p-2 border border-gray-300 rounded mt-1" required>
        </div>
        <div class="mb-4">
            <label for="purpose" class="block text-gray-700">Призначення платежу</label>
            <textarea id="purpose" placeholder="Призначення платежу"
                      class="w-full p-2 border border-gray-300 rounded mt-1"
                      maxlength="140" rows="3" required></textarea>
        </div>
        <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded mt-4 hover:bg-blue-600">
            Згенерувати QR-код
        </button>
        <p id="error-msg" class="mt-3 text-red-600 text-sm text-center hidden"></p>
        <div id="qrcode" class="mt-8 flex justify-center"></div>
        <p id="byte-count" class="mt-2 text-gray-500 text-xs text-center hidden"></p>
    </form>
</div>
<script src="./qrcode.bundle.js"></script>
<script>
    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    function clearError() {
        const el = document.getElementById('error-msg');
        el.textContent = '';
        el.classList.add('hidden');
    }

    function generateQRCode(event) {
        event.preventDefault();
        clearError();

        const account   = document.getElementById('account').value.trim();
        const edrpo     = document.getElementById('edrpo').value.trim();
        const recipient = document.getElementById('recipient').value.trim();
        const amount    = document.getElementById('amount').value;
        const purpose   = document.getElementById('purpose').value.trim();

        // Strip trailing decimal zeros: "100.00" → "100", "576.45" → "576.45"
        const formattedAmount = parseFloat(amount).toString();

        // NBU QR payload — 13 fields, each terminated by \n (LF), in this order:
        // BCD / version / encoding / function / BIC(empty) /
        // recipient / IBAN / UAH{amount} / edrpo / goal(empty) / reference(empty) /
        // purpose / display(empty)
        const dataStr = [
            'BCD', '001', '1', 'UCT', '',
            recipient, account, `UAH${formattedAmount}`,
            edrpo, '', '', purpose, ''
        ].join('\n') + '\n';

        const utf8Bytes = new TextEncoder().encode(dataStr).length;

        if (utf8Bytes > 331) {
            showError(`Дані перевищують 331 байт (${utf8Bytes} б). Скоротіть призначення платежу.`);
            return false;
        }

        const container = document.getElementById('qrcode');
        container.innerHTML = '';

        const canvas = document.createElement('canvas');
        container.appendChild(canvas);

        // NBU spec: Base64url-encode payload (URL-safe, no padding) and
        // embed it in https://bank.gov.ua/qr/<encoded>
        const bytes = new TextEncoder().encode(dataStr);
        const binStr = Array.from(bytes, b => String.fromCharCode(b)).join('');
        const b64url = btoa(binStr).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        const qrText = 'https://bank.gov.ua/qr/' + b64url;

        QRCode.toCanvas(canvas, qrText, {
            errorCorrectionLevel: 'M',
            width: 256,
            margin: 2
        }, function(err) {
            if (err) {
                container.innerHTML = '';
                showError('Помилка генерації: ' + err.message);
                return;
            }
            const byteEl = document.getElementById('byte-count');
            byteEl.textContent = `Розмір даних: ${utf8Bytes} / 331 байт`;
            byteEl.classList.remove('hidden');
        });

        return false;
    }

    document.addEventListener('DOMContentLoaded', function () {
        var params = new URLSearchParams(window.location.search);
        var mapping = {
            iban:      'account',
            edrpo:     'edrpo',
            recipient: 'recipient',
            amount:    'amount',
            purpose:   'purpose'
        };
        Object.keys(mapping).forEach(function (param) {
            var value = params.get(param);
            if (value !== null) {
                document.getElementById(mapping[param]).value = value;
            }
        });
    });
</script>
</body>
</html>
